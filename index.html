<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARUTE · Historial Médico Familiar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f4ee;--card:#fff;--ink:#0e2230;--ink-2:#33485a;--muted:#6a7d8c;--line:#e8e3d8;--line-soft:#eef1f3;
--acento:#0e7c7b;--acento-ink:#0a5f5e;--acento-soft:#e4f1f0;
--r:20px;--sh:0 1px 2px rgba(14,34,48,.04),0 12px 34px rgba(14,34,48,.07);--sh-sm:0 1px 2px rgba(14,34,48,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
svg.lucide{stroke-width:2;flex:0 0 auto}
.wrap{max-width:560px;width:100%;margin:0 auto;padding:0 20px 56px;flex:1;display:flex;flex-direction:column}
header{padding:60px 0 8px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--acento-soft);color:var(--acento-ink);padding:7px 15px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.4px}
.badge svg{width:15px;height:15px}
.jp{font-weight:700;letter-spacing:2px;font-size:14px}

/* === KARUTE animated title === */
.karute-title{
  --anim-color:#37FF8B;
  position:relative;
  display:inline-block;
  margin-top:22px;
  font-family:'Inter',-apple-system,sans-serif;
  font-size:clamp(2.6rem,11vw,3.6rem);
  font-weight:800;
  letter-spacing:7px;
  text-transform:uppercase;
  color:transparent;
  -webkit-text-stroke:2px var(--ink);
  cursor:default;
  line-height:1.1;
  user-select:none;
}
.karute-title .kt-fill{
  position:absolute;
  box-sizing:border-box;
  inset:0;
  color:var(--anim-color);
  -webkit-text-stroke:2px var(--anim-color);
  border-right:5px solid var(--anim-color);
  overflow:hidden;
  white-space:nowrap;
  animation:kt-sweep 3s ease-in-out infinite;
}
@keyframes kt-sweep{
  0%,5%{width:0%;filter:none}
  42%,60%{width:100%;filter:drop-shadow(0 0 22px var(--anim-color))}
  95%,100%{width:0%;filter:none}
}
/* === end animated title === */

.accent-line{width:46px;height:4px;background:var(--acento);border-radius:99px;margin:20px auto 13px}
header p{font-size:14px;color:var(--muted);font-weight:500}
.cards{margin-top:38px;display:flex;flex-direction:column;gap:15px}
.pcard{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);box-shadow:var(--sh);padding:20px;text-decoration:none;color:inherit;transition:.2s;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--acento);opacity:.85}
.pcard:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(14,34,48,.05),0 18px 42px rgba(14,34,48,.12);border-color:var(--acento-soft)}
.pcard:active{transform:translateY(0) scale(.99)}
.av{width:58px;height:58px;border-radius:50%;background:var(--acento-soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.av svg{width:28px;height:28px;color:var(--acento)}
.pinfo{flex:1;min-width:0}
.pinfo .rl{font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--acento);margin-bottom:3px}
.pinfo .nm{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
.pinfo .meta{font-size:12.5px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 12px}
.pinfo .meta span{display:flex;align-items:center;gap:5px}.pinfo .meta svg{width:13px;height:13px;opacity:.85}
.go{flex:0 0 auto;width:38px;height:38px;border-radius:50%;background:var(--acento-soft);display:flex;align-items:center;justify-content:center;color:var(--acento);transition:.2s}
.pcard:hover .go{background:var(--acento);color:#fff}
.go svg{width:19px;height:19px}
footer{text-align:center;color:var(--muted);font-size:11.5px;margin-top:auto;padding-top:40px;line-height:1.7}footer b{color:var(--acento)}
</style></head>
<body>
<div class="wrap">
  <header>
    <span class="badge"><i data-lucide="heart-pulse"></i> <span class="jp">カルテ</span></span>
    <div class="karute-title">
      <span class="actual-text">&nbsp;KARUTE&nbsp;</span>
      <span class="kt-fill" aria-hidden="true">&nbsp;KARUTE&nbsp;</span>
    </div>
    <div class="accent-line"></div>
    <p>Selecciona un paciente para ver sus exámenes</p>
  </header>

  <div class="cards">
    <a class="pcard" href="padre/">
      <div class="av"><i data-lucide="user"></i></div>
      <div class="pinfo">
        <div class="rl">Padre</div>
        <div class="nm">Rana Waseem Ahmad</div>
        <div class="meta"><span><i data-lucide="heart-pulse"></i> Cardiología</span><span><i data-lucide="scan-line"></i> Imágenes</span><span><i data-lucide="flask-conical"></i> Laboratorio</span></div>
      </div>
      <span class="go"><i data-lucide="chevron-right"></i></span>
    </a>

    <a class="pcard" href="madre/">
      <div class="av"><i data-lucide="user"></i></div>
      <div class="pinfo">
        <div class="rl">Madre</div>
        <div class="nm">Diana Patricia Aguirre</div>
        <div class="meta"><span><i data-lucide="scan-line"></i> Imágenes</span><span><i data-lucide="flask-conical"></i> Laboratorio</span></div>
      </div>
      <span class="go"><i data-lucide="chevron-right"></i></span>
    </a>
  </div>

  <footer>Plataforma privada de salud familiar<br>Información confidencial · Hecho con <b>NAGARE</b></footer>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body></html>
